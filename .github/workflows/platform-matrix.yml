name: Platform runtime + cjcj matrix

on:
  push:
    branches: [ci/platform-matrix]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: platform-matrix-${{ github.ref }}
  cancel-in-progress: false

env:
  CJCJ_TOOLCHAIN: nightly-1.2.0-alpha.20260721165458
  RUNTIME_REPOSITORY: https://github.com/cjcj-dev/cangjie-runtime.git
  RUNTIME_REF: ae074bd283796236a5b1962545cf5e548b8856f6
  RUNTIME_VERSION: 1.2.0-alpha.20260721165458
  CJ_HEAP_SIZE: 12GB

jobs:
  platform:
    name: ${{ matrix.runner }} / runtime + cjcj + smoke
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            sdk_runtime_dir: darwin_aarch64_cjnative
            sdk_archive: cangjie-sdk-mac-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: macos-26-intel
            sdk_runtime_dir: darwin_x86_64_cjnative
            sdk_archive: cangjie-sdk-mac-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: macos-15
            sdk_runtime_dir: darwin_aarch64_cjnative
            sdk_archive: cangjie-sdk-mac-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: macos-15-intel
            sdk_runtime_dir: darwin_x86_64_cjnative
            sdk_archive: cangjie-sdk-mac-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-24.04
            sdk_runtime_dir: linux_x86_64_cjnative
            sdk_archive: cangjie-sdk-linux-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-24.04-arm
            sdk_runtime_dir: linux_aarch64_cjnative
            sdk_archive: cangjie-sdk-linux-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-22.04
            sdk_runtime_dir: linux_x86_64_cjnative
            sdk_archive: cangjie-sdk-linux-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-22.04-arm
            sdk_runtime_dir: linux_aarch64_cjnative
            sdk_archive: cangjie-sdk-linux-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: windows-2025
            sdk_runtime_dir: windows_x86_64_cjnative
            sdk_archive: cangjie-sdk-windows-x64-1.2.0-alpha.20260721165458.zip
          - runner: windows-2022
            sdk_runtime_dir: windows_x86_64_cjnative
            sdk_archive: cangjie-sdk-windows-x64-1.2.0-alpha.20260721165458.zip
    env:
      MATRIX_RUNNER: ${{ matrix.runner }}
      SDK_RUNTIME_DIR: ${{ matrix.sdk_runtime_dir }}
      SDK_ARCHIVE: ${{ matrix.sdk_archive }}

    steps:
      - name: Checkout cjcj
        uses: actions/checkout@v4

      # The consolidated cangjie-runtime main already carries the GC and Darwin
      # fixes; no per-runner patch overlay is needed.
      - name: Checkout pinned runtime
        if: always()
        uses: actions/checkout@v4
        with:
          repository: cjcj-dev/cangjie-runtime
          ref: ${{ env.RUNTIME_REF }}
          fetch-depth: 1
          path: runtime-source

      - name: Prepare MSYS2/CLANG64 runtime toolchain
        if: always() && runner.os == 'Windows'
        # CLANG64: pure LLVM toolchain (clang + libc++ + compiler-rt bundled).
        # MINGW64's clang parses GCC-16 libstdc++ headers and miscompiles
        # std::hash<std::string> (implicitly-deleted); the runtime's reference
        # Windows toolchain is a much older GCC header set.
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          # release:false = provision the runner's preinstalled C:\msys64 instead of a
          # fresh RUNNER_TEMP\msys64 — build_runtime.mjs invokes C:\msys64\usr\bin\bash.exe,
          # so the CLANG64 packages must land in that installation (round-8 root: the two
          # msys2 trees diverged and /clang64/bin was empty at build time).
          release: false
          update: true
          path-type: inherit
          install: >-
            git make python gzip unzip file binutils
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja

      - name: Runtime build (Linux/macOS native)
        if: always() && runner.os != 'Windows'
        run: npx --yes zx@8 ci/platform_matrix/build_runtime.mjs

      - name: Runtime build (Windows target via MSYS2/CLANG64)
        if: always() && runner.os == 'Windows'
        run: npx --yes zx@8 ci/platform_matrix/build_runtime.mjs

      - name: Download native fixed LLVM tuple
        if: always() && runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx --yes zx@8 ci/platform_matrix/fetch_llvm_tuple.mjs

      - name: Download native fixed LLVM tuple (Windows)
        if: always() && runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx --yes zx@8 ci/platform_matrix/fetch_llvm_tuple.mjs

      - name: Official SDK + O1 cjcj build
        if: always()
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
        run: npx --yes zx@8 ci/platform_matrix/build_cjcj.mjs

      - name: cjcj compile/run + pinned-runtime combination smoke
        if: always()
        run: npx --yes zx@8 ci/platform_matrix/run_smoke.mjs

      - name: Summarize final key error
        if: always()
        run: npx --yes zx@8 ci/platform_matrix/summarize_job.mjs

      - name: Upload diagnostics and key products
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.runner }}-${{ github.run_attempt }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            .platform-ci/logs/**
            .platform-ci/step-summary.md
            .platform-ci/runtime-install/**
            .platform-ci/bin/**
