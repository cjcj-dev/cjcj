name: Platform runtime + cjcj matrix

on:
  push:
    branches: [ci/platform-matrix]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: platform-matrix-${{ github.ref }}
  cancel-in-progress: false

env:
  CJCJ_TOOLCHAIN: nightly-1.2.0-alpha.20260721165458
  RUNTIME_REPOSITORY: https://github.com/CangjieFork/cangjie_runtime.git
  RUNTIME_REF: f851b846e275859aeccacd0edd42b81f28cb25bd
  RUNTIME_DARWIN_PATCH_REF: a88f8e29beadae4525dccb49dc4bd0b11d1799dd
  RUNTIME_VERSION: 1.2.0-alpha.20260721165458
  CJ_HEAP_SIZE: 12GB

defaults:
  run:
    shell: bash

jobs:
  platform:
    name: ${{ matrix.runner }} / runtime + cjcj + smoke
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            sdk_runtime_dir: darwin_aarch64_cjnative
            sdk_archive: cangjie-sdk-mac-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: macos-26-intel
            sdk_runtime_dir: darwin_x86_64_cjnative
            sdk_archive: cangjie-sdk-mac-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: macos-15
            sdk_runtime_dir: darwin_aarch64_cjnative
            sdk_archive: cangjie-sdk-mac-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: macos-15-intel
            sdk_runtime_dir: darwin_x86_64_cjnative
            sdk_archive: cangjie-sdk-mac-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-24.04
            sdk_runtime_dir: linux_x86_64_cjnative
            sdk_archive: cangjie-sdk-linux-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-24.04-arm
            sdk_runtime_dir: linux_aarch64_cjnative
            sdk_archive: cangjie-sdk-linux-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-22.04
            sdk_runtime_dir: linux_x86_64_cjnative
            sdk_archive: cangjie-sdk-linux-x64-1.2.0-alpha.20260721165458.tar.gz
          - runner: ubuntu-22.04-arm
            sdk_runtime_dir: linux_aarch64_cjnative
            sdk_archive: cangjie-sdk-linux-aarch64-1.2.0-alpha.20260721165458.tar.gz
          - runner: windows-2025
            sdk_runtime_dir: windows_x86_64_cjnative
            sdk_archive: cangjie-sdk-windows-x64-1.2.0-alpha.20260721165458.zip
          - runner: windows-2022
            sdk_runtime_dir: windows_x86_64_cjnative
            sdk_archive: cangjie-sdk-windows-x64-1.2.0-alpha.20260721165458.zip
    env:
      MATRIX_RUNNER: ${{ matrix.runner }}
      SDK_RUNTIME_DIR: ${{ matrix.sdk_runtime_dir }}
      SDK_ARCHIVE: ${{ matrix.sdk_archive }}

    steps:
      - name: Checkout cjcj
        uses: actions/checkout@v4

      - name: Checkout pinned runtime
        if: always()
        uses: actions/checkout@v4
        with:
          repository: CangjieFork/cangjie_runtime
          ref: ${{ env.RUNTIME_REF }}
          fetch-depth: 1
          path: runtime-source

      - name: Apply pinned Darwin runtime fixes
        if: always() && runner.os == 'macOS'
        working-directory: runtime-source
        run: |
          git fetch --no-tags --depth=12 origin "$RUNTIME_DARWIN_PATCH_REF"
          test "$(git rev-parse FETCH_HEAD)" = "$RUNTIME_DARWIN_PATCH_REF"
          for patch in \
            0c9a427767088d40e0716c2bff71c7798ad2eb95 \
            69e32e670c2bb8bafc68d56b1b05d72f14887257 \
            a6c0a02c07f5cf072157a56ed7dc3c5855cce319 \
            972c8a4563669af0a12b7b95db776ab26ccdc090
          do
            git diff "$patch^" "$patch" | git apply --check
            git diff "$patch^" "$patch" | git apply
          done
          git diff --check

      - name: Prepare MSYS2/MinGW runtime toolchain
        if: always() && runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            git make python gzip unzip file binutils
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-compiler-rt
            mingw-w64-x86_64-libc++
            mingw-w64-x86_64-cmake

      - name: Runtime build (Linux/macOS native)
        if: always() && runner.os != 'Windows'
        run: bash ci/platform_matrix/build_runtime.sh

      - name: Runtime build (Windows target via MSYS2/MinGW)
        if: always() && runner.os == 'Windows'
        shell: msys2 {0}
        run: bash ci/platform_matrix/build_runtime.sh

      - name: Download native fixed LLVM tuple
        if: always() && runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash ci/platform_matrix/fetch_llvm_tuple.sh

      - name: Download native fixed LLVM tuple (MSYS2)
        if: always() && runner.os == 'Windows'
        shell: msys2 {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash ci/platform_matrix/fetch_llvm_tuple.sh

      - name: Official SDK + O1 cjcj build
        if: always()
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
        run: bash ci/platform_matrix/build_cjcj.sh

      - name: cjcj compile/run + pinned-runtime combination smoke
        if: always()
        run: bash ci/platform_matrix/run_smoke.sh

      - name: Summarize final key error
        if: always()
        run: bash ci/platform_matrix/summarize_job.sh

      - name: Upload diagnostics and key products
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.runner }}-${{ github.run_attempt }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            .platform-ci/logs/**
            .platform-ci/step-summary.md
            .platform-ci/runtime-install/**
            .platform-ci/bin/**
