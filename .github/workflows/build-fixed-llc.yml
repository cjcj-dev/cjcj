name: Platform LLVM tools

on:
  push:
    branches: [debug/llc-build]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  LLVM_FORK_URL: https://github.com/cjcj-dev/cjcj-llvm.git
  LLVM_FORK_REF: fix/scheddag-memcorrupt
  # getUNDEF lowering + clang CTAD fix + in-tree demangler source stub.
  LLVM_FORK_SHA: 4f61703c3225d60a7dc839718d822911628e6740
  # Supplies ModuleFormat.fbs.
  CANGJIE_COMPILER_URL: https://gitcode.com/Cangjie/cangjie_compiler.git
  CANGJIE_COMPILER_SHA: 87fff87a1883da9bfe5956296d8079e8a7f9d15f
  # Matches the FlatBuffers revision pinned by cangjie_compiler.
  FLATBUFFERS_URL: https://gitcode.com/openharmony/third_party_flatbuffers.git
  FLATBUFFERS_SHA: c3e4d69cbd5950e43f775ba76eadb30750d6e0b7

jobs:
  build-tools:
    name: ${{ matrix.platform }} / Build tools
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add a native runner/platform/LLVM target tuple here to extend the mechanism.
          - runner: ubuntu-22.04
            platform: linux_x86_64
            llvm-targets: X86
            portability-tag: glibc2.35
          - runner: ubuntu-24.04-arm
            platform: linux_aarch64
            llvm-targets: AArch64
            portability-tag: glibc2.39
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout cjcj
        uses: actions/checkout@v7

      - name: Restore LLVM tools cache
        id: cache
        uses: actions/cache@v6
        with:
          path: fixed-toolchain/${{ matrix.platform }}
          key: fixed-llvm-tools-${{ matrix.platform }}-${{ matrix.portability-tag }}-${{ env.LLVM_FORK_SHA }}-${{ env.CANGJIE_COMPILER_SHA }}-${{ hashFiles('.github/workflows/build-fixed-llc.yml', 'runtime_shim/cjselfhost_llvmshim.cpp') }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang ninja-build cmake

      - name: Checkout source repositories
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none --branch "$LLVM_FORK_REF" "$LLVM_FORK_URL" llvm-fork
          git -C llvm-fork checkout --detach "$LLVM_FORK_SHA"
          test "$(git -C llvm-fork rev-parse HEAD)" = "$LLVM_FORK_SHA"

          git clone --filter=blob:none --no-checkout "$CANGJIE_COMPILER_URL" cangjie-compiler
          git -C cangjie-compiler sparse-checkout set schema
          git -C cangjie-compiler fetch --depth=1 origin "$CANGJIE_COMPILER_SHA"
          git -C cangjie-compiler checkout --detach "$CANGJIE_COMPILER_SHA"
          test "$(git -C cangjie-compiler rev-parse HEAD)" = "$CANGJIE_COMPILER_SHA"

          git clone --filter=blob:none --no-checkout "$FLATBUFFERS_URL" flatbuffers
          git -C flatbuffers fetch --depth=1 origin "$FLATBUFFERS_SHA"
          git -C flatbuffers checkout --detach "$FLATBUFFERS_SHA"
          test "$(git -C flatbuffers rev-parse HEAD)" = "$FLATBUFFERS_SHA"

      - name: Build LLVM tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cmake -G Ninja -S llvm-fork/llvm -B llc-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm-targets }}" \
            -DLLVM_ENABLE_PROJECTS="" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-gline-tables-only -include cstdint -include unordered_map -include map -include vector -include string"
          ninja -C llc-build llc
          mkdir -p "fixed-toolchain/${{ matrix.platform }}"
          gzip -n -c -9 llc-build/bin/llc > "fixed-toolchain/${{ matrix.platform }}/llc.gz"

      - name: Generate LLVM shim
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cmake -G Ninja -S flatbuffers -B flatbuffers-build \
            -DFLATBUFFERS_BUILD_TESTS=OFF \
            -DFLATBUFFERS_BUILD_FLATLIB=OFF \
            -DFLATBUFFERS_BUILD_SHAREDLIB=OFF
          ninja -C flatbuffers-build flatc
          mkdir -p shim-generated/flatbuffers
          flatbuffers-build/flatc --no-warnings -c -o shim-generated/flatbuffers \
            cangjie-compiler/schema/ModuleFormat.fbs
          clang++ -std=c++17 -O2 -fPIC -fno-rtti -fno-exceptions \
            -Illvm-fork/llvm/include -Illc-build/include \
            -Iflatbuffers/include -Ishim-generated \
            -c runtime_shim/cjselfhost_llvmshim.cpp \
            -o "fixed-toolchain/${{ matrix.platform }}/cjselfhost_llvmshim.o"

      - name: Verify LLVM tools
        run: |
          mkdir -p "$RUNNER_TEMP/fixed-llvm-tools"
          gunzip -c "fixed-toolchain/${{ matrix.platform }}/llc.gz" \
            > "$RUNNER_TEMP/fixed-llvm-tools/llc"
          chmod +x "$RUNNER_TEMP/fixed-llvm-tools/llc"
          "$RUNNER_TEMP/fixed-llvm-tools/llc" --version | head -5
          file "fixed-toolchain/${{ matrix.platform }}/cjselfhost_llvmshim.o"
          shim_exports="$(nm -C "fixed-toolchain/${{ matrix.platform }}/cjselfhost_llvmshim.o" \
            | grep -cE ' T (LLVMGlobalObjectAddStringAttribute|LLVMSelfhost|CJOF)')"
          test "$shim_exports" -ge 90
          echo "shim exported symbols: $shim_exports"
          sha256sum "fixed-toolchain/${{ matrix.platform }}/llc.gz" \
            "fixed-toolchain/${{ matrix.platform }}/cjselfhost_llvmshim.o"

      - name: Upload LLVM tools
        uses: actions/upload-artifact@v7
        with:
          name: fixed-llvm-tools-${{ matrix.platform }}
          path: fixed-toolchain/${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 7
