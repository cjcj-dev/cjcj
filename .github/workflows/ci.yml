# CI. Build+smoke run on linux-x64 with llc+shim built from pinned sources;
# other platforms run a non-gating SDK provisioning check.
# Rationale and platform matrix: reports/REPORT-ci-pipelines.md.
name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CJCJ_TOOLCHAIN: nightly-1.2.0-alpha.20260721165458
  RUNTIME_REF: 08374ada1d241453fac8ef56629345a90d0cccc8

jobs:
  lint:
    name: lint
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflows
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
      - name: Shellcheck scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck --severity=error \
            scripts/package_sdk.sh ci/smoke/run_smoke.sh runtime_shim/build_shim.sh
      - name: Check zx script syntax
        run: |
          find ci runtime_shim -type f -name '*.mjs' -print0 \
            | xargs -0 -n1 node --check
      - name: Check smoke assets
        run: |
          test "$(find ci/smoke -maxdepth 1 -name '*.cj' | wc -l)" -ge 5
          test -f ci/smoke/macro_demo/mymacros/def.cj
          test -f ci/smoke/macro_demo/app/main.cj
      - name: Reject vendored LLVM binaries
        run: test -z "$(git ls-files 'ci/prebuilt/**' 'runtime_shim/prebuilt/**')"

  fixed-llvm-tools:
    name: source-build fixed LLVM tools
    uses: ./.github/workflows/build-fixed-llc.yml

  build:
    name: build ${{ matrix.runner }}
    needs: fixed-llvm-tools
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, experimental: false }
          - { runner: ubuntu-22.04, experimental: false }
          - { runner: ubuntu-26.04, experimental: true }
    steps:
      - uses: actions/checkout@v4
      - name: Download source-built LLVM tools
        uses: actions/download-artifact@v4
        with:
          name: fixed-llvm-tools-linux_x86_64
          path: fixed-toolchain/linux_x86_64
      - name: Restore SDK cache
        id: sdkcache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Cache cjpm build
        uses: actions/cache@v4
        with:
          path: target
          key: cjpm-${{ runner.os }}-${{ matrix.runner }}-${{ env.CJCJ_TOOLCHAIN }}-${{ github.sha }}
          restore-keys: |
            cjpm-${{ runner.os }}-${{ matrix.runner }}-${{ env.CJCJ_TOOLCHAIN }}-
      - name: Install SDK
        id: setup
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
          FIXED_LLC_GZ: ${{ github.workspace }}/fixed-toolchain/linux_x86_64/llc.gz
        run: npx --yes zx@8 ci/setup_sdk.mjs
      # Save only after a successful install so a partial ~/.cjv is never cached.
      - name: Save SDK cache
        if: steps.setup.outcome == 'success' && steps.sdkcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      # Keyed by matrix.runner: the runtime .so links the builder's glibc, so a cache
      # entry built on a newer distro is unloadable on an older one (GLIBC_x.y not found).
      - name: Restore patched runtime cache
        id: rtcache
        uses: actions/cache/restore@v4
        with:
          path: dist-runtime
          key: rt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.runner }}-${{ env.RUNTIME_REF }}
      - name: Install runtime build dependencies
        if: steps.rtcache.outputs.cache-hit != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang cmake make
      - name: Build pinned runtime
        if: steps.rtcache.outputs.cache-hit != 'true'
        env:
          RUNTIME_VERSION: ${{ env.CJCJ_TOOLCHAIN }}
        run: npx --yes zx@8 ci/build_patched_runtime.mjs "$PWD/dist-runtime"
      - name: Save patched runtime cache
        if: steps.rtcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dist-runtime
          key: rt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.runner }}-${{ env.RUNTIME_REF }}
      - name: Activate pinned runtime
        run: npx --yes zx@8 ci/install_patched_runtime.mjs "$PWD/dist-runtime"
      - name: Build runtime shim
        env:
          CJCJ_LLVM_SHIM_O: ${{ github.workspace }}/fixed-toolchain/linux_x86_64/cjselfhost_llvmshim.o
        run: npx --yes zx@8 runtime_shim/build_shim.mjs
      - name: Build workspace
        run: cjpm build
      # Deploy name must be cjcj, not cjc (process-name GC stack-root exclusion -> SEGV).
      - name: Deploy compiler
        run: |
          test -f "target/release/bin/cjcj::cjc"
          cp "target/release/bin/cjcj::cjc" "target/release/bin/cjcj"
      - name: Run smoke tests
        run: bash ci/smoke/run_smoke.sh "$PWD/target/release/bin/cjcj"

  # Non-gating: verifies SDK provisioning on non-x64 platforms; does not build cjcj.
  provision:
    name: provision ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Restore SDK cache
        id: sdkcache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Install SDK
        id: setup
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
        run: npx --yes zx@8 ci/setup_sdk.mjs
      - name: Save SDK cache
        if: steps.setup.outcome == 'success' && steps.sdkcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Diagnose SDK layout
        run: |
          ls -la "$CANGJIE_HOME/bin" || true
          file "$CANGJIE_HOME/bin/cjc" || true
          ls "$CANGJIE_HOME/runtime/lib" || true
      - name: Verify official cjc
        run: |
          set -x
          if [ "$(uname -s)" = "Darwin" ]; then xattr -dr com.apple.quarantine "$CANGJIE_HOME" || true; fi
          # shellcheck disable=SC1091
          source "$CANGJIE_HOME/envsetup.sh"
          echo 'main(): Int64 { println("provision ok"); return 0 }' > "$RUNNER_TEMP/p.cj"
          cjc "$RUNNER_TEMP/p.cj" -o "$RUNNER_TEMP/p" && "$RUNNER_TEMP/p"

# Adding a build platform requires a matching matrix item in build-fixed-llc.yml and
# downloading that platform's fixed-llvm-tools artifact above.
