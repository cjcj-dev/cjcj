# Release. Repackages the official SDK tree as a cjcj SDK: bin/cjc is our
# Cangjie-built compiler and runtime/lib/<plat>/libcangjie-runtime.{so,dylib,dll} is rebuilt
# from the pinned cjcj-dev/cangjie-runtime main commit. Smoke runs against the
# packaged bin/cjc. Linux x64/arm64, macOS x64/arm64, and Windows x64 are
# enabled; set dry_run to build artifacts without publishing.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Build artifacts only, skip GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  CJCJ_TOOLCHAIN: nightly-1.2.0-alpha.20260721165458
  # RUNTIME_REF comes from ci/runtime_pin.env via the "Load runtime pin" step —
  # the pin lives in exactly one file (a stale copy here once poisoned the
  # runtime cache key while the build itself followed the pin file).

jobs:
  fixed-llvm-tools:
    name: Build LLVM tools
    uses: ./.github/workflows/build-fixed-llc.yml

  build:
    name: ${{ matrix.platform }} / Build release
    needs: fixed-llvm-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, platform: linux-x64, llvm_platform: linux_x86_64, sdk_runtime_dir: linux_x86_64_cjnative }
          # linux-aarch64 re-enabled 0724: the R1 llc SEGV was the un-activated
          # fixed llc (setup only mapped Linux/x86_64, fixed in 8e2f9ea6); the
          # arm-soak ×20 packaged smoke run 30069890604 passed clean.
          - { runner: ubuntu-24.04-arm, platform: linux-aarch64, llvm_platform: linux_aarch64, sdk_runtime_dir: linux_aarch64_cjnative }
          - { runner: macos-15-intel, platform: darwin-x64, llvm_platform: darwin_x86_64, sdk_runtime_dir: darwin_x86_64_cjnative }
          - { runner: macos-15, platform: darwin-arm64, llvm_platform: darwin_aarch64, sdk_runtime_dir: darwin_aarch64_cjnative }
          - { runner: windows-2025, platform: windows-x64, llvm_platform: windows_x86_64, sdk_runtime_dir: windows_x86_64_cjnative }
    uses: ./.github/workflows/build-release-package.yml
    with:
      runner: ${{ matrix.runner }}
      platform: ${{ matrix.platform }}
      llvm_platform: ${{ matrix.llvm_platform }}
      sdk_runtime_dir: ${{ matrix.sdk_runtime_dir }}
      version: ${{ inputs.version }}
    secrets: inherit

  publish:
    name: Publish release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout cjcj
        uses: actions/checkout@v7
      - name: Download SDK artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags=(--title "cjcj v${{ inputs.version }}" --notes "cjcj v${{ inputs.version }}")
          if [ "${{ inputs.prerelease }}" = "true" ]; then flags+=(--prerelease); fi
          if [ "${{ inputs.draft }}" = "true" ]; then flags+=(--draft); fi
          mapfile -t assets < <(find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.zip' \) | sort)
          gh release create "v${{ inputs.version }}" "${flags[@]}" "${assets[@]}"

# Darwin and Windows consume native artifacts from platform-tuples.yml through
# ci/platform_matrix/fetch_llvm_tuple.mjs; both Linux architectures consume the
# source-built artifacts from build-fixed-llc.yml.
