# Release. Repackages the official SDK tree with bin/cjc replaced by bin/cjcj.
# linux-x64 only (per-platform prebuilt shim .o). Details: reports/REPORT-ci-pipelines.md.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CJCJ_TOOLCHAIN: nightly-1.2.0-alpha.20260712020030

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, platform: linux-x64 }
    steps:
      - uses: actions/checkout@v4
      - name: Restore SDK cache
        id: sdkcache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Install SDK
        id: setup
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
        run: bash ci/setup_sdk.sh
      - name: Save SDK cache
        if: steps.setup.outcome == 'success' && steps.sdkcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Install patchelf
        run: sudo apt-get update -qq && sudo apt-get install -y -qq patchelf
      - name: Build runtime shim
        run: bash runtime_shim/build_shim.sh
      - name: Build workspace
        run: cjpm build
      - name: Deploy compiler
        run: |
          test -f "target/release/bin/cjcj::cjc"
          cp "target/release/bin/cjcj::cjc" "target/release/bin/cjcj"
      - name: Run smoke tests
        run: bash ci/smoke/run_smoke.sh "$PWD/target/release/bin/cjcj"
      - name: Package SDK
        run: |
          bash scripts/package_sdk.sh \
            --sdk "$CANGJIE_HOME" \
            --binary "$PWD/target/release/bin/cjcj::cjc" \
            --version "${{ inputs.version }}" \
            --platform "${{ matrix.platform }}" \
            --outdir "$PWD/dist"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.platform }}
          path: |
            dist/cjcj-${{ inputs.version }}-${{ matrix.platform }}.tar.gz
            dist/cjcj-${{ inputs.version }}-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags=(--title "cjcj v${{ inputs.version }}" --notes "cjcj v${{ inputs.version }}")
          if [ "${{ inputs.prerelease }}" = "true" ]; then flags+=(--prerelease); fi
          if [ "${{ inputs.draft }}" = "true" ]; then flags+=(--draft); fi
          mapfile -t assets < <(find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.zip' \) | sort)
          gh release create "v${{ inputs.version }}" "${flags[@]}" "${assets[@]}"

# Adding a platform to the build matrix requires runtime_shim/prebuilt/<plat>/cjselfhost_llvmshim.o.
