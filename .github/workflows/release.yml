# Release. Repackages the official SDK tree as a cjcj SDK: bin/cjc is our
# Cangjie-built compiler and runtime/lib/<plat>/libcangjie-runtime.so is rebuilt
# from the pinned cjcj-dev/cangjie-runtime main commit. Smoke runs against the
# packaged bin/cjc. Linux x64 + aarch64; macOS/Windows are BLOCKED (see
# reports/REPORT-relmatrix.md). Set dry_run to build artifacts without publishing.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Build artifacts only, skip GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CJCJ_TOOLCHAIN: nightly-1.2.0-alpha.20260721165458
  RUNTIME_REF: ae074bd283796236a5b1962545cf5e548b8856f6

jobs:
  fixed-llvm-tools:
    name: source-build fixed LLVM tools
    uses: ./.github/workflows/build-fixed-llc.yml

  build:
    name: build ${{ matrix.platform }}
    needs: fixed-llvm-tools
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, platform: linux-x64, llvm_platform: linux_x86_64 }
          # linux-aarch64 is validated through build + package (the cross-compiled shim
          # links, the native patched runtime builds), but the packaged compiler livelocks
          # the GC mutator-list lock on the oversubscribed 4-core arm runner
          # (04_iface_enum / 06_macro spin to the 240s watchdog and SIGABRT). Held until the
          # runtime aarch64 mutator-lock issue is fixed; then add an aarch64 source-build
          # tuple in build-fixed-llc.yml and re-enable this line. See REPORT-relmatrix.
          # - { runner: ubuntu-24.04-arm, platform: linux-aarch64, llvm_platform: linux_aarch64 }
    steps:
      - uses: actions/checkout@v4
      - name: Download source-built LLVM tools
        uses: actions/download-artifact@v4
        with:
          name: fixed-llvm-tools-${{ matrix.llvm_platform }}
          path: fixed-toolchain/${{ matrix.llvm_platform }}
      - name: Restore SDK cache
        id: sdkcache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Install SDK
        id: setup
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
          FIXED_LLC_GZ: ${{ github.workspace }}/fixed-toolchain/${{ matrix.llvm_platform }}/llc.gz
        run: npx --yes zx@8 ci/setup_sdk.mjs
      - name: Save SDK cache
        if: steps.setup.outcome == 'success' && steps.sdkcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Restore patched runtime cache
        id: rtcache
        uses: actions/cache/restore@v4
        with:
          path: dist-runtime
          key: rt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.runner }}-${{ env.RUNTIME_REF }}
      # patchelf is always required by scripts/package_sdk.mjs, even on a runtime cache hit.
      - name: Install packaging dependency
        run: sudo apt-get update -qq && sudo apt-get install -y -qq patchelf
      - name: Install runtime build dependencies
        if: steps.rtcache.outputs.cache-hit != 'true'
        run: sudo apt-get install -y -qq clang cmake make
      - name: Build fork runtime
        if: steps.rtcache.outputs.cache-hit != 'true'
        env:
          RUNTIME_VERSION: ${{ inputs.version }}
        run: npx --yes zx@8 ci/build_patched_runtime.mjs "$PWD/dist-runtime"
      - name: Save patched runtime cache
        if: steps.rtcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dist-runtime
          key: rt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.runner }}-${{ env.RUNTIME_REF }}
      - name: Activate pinned runtime
        run: npx --yes zx@8 ci/install_patched_runtime.mjs "$PWD/dist-runtime"
      - name: Build runtime shim
        env:
          CJCJ_LLVM_SHIM_O: ${{ github.workspace }}/fixed-toolchain/${{ matrix.llvm_platform }}/cjselfhost_llvmshim.o
        run: npx --yes zx@8 runtime_shim/build_shim.mjs
      - name: Build workspace
        run: cjpm build
      - name: Package SDK
        run: |
          npx --yes zx@8 scripts/package_sdk.mjs \
            --sdk "$CANGJIE_HOME" \
            --binary "$PWD/target/release/bin/cjcj::cjc" \
            --runtime-so "$PWD/dist-runtime/libcangjie-runtime.so" \
            --version "${{ inputs.version }}" \
            --platform "${{ matrix.platform }}" \
            --outdir "$PWD/dist"
      # Smoke the shipped artifact: packaged bin/cjc (renamed) + fork-built runtime.
      - name: Smoke packaged SDK
        run: |
          set -e
          pkg="cjcj-${{ inputs.version }}-${{ matrix.platform }}"
          mkdir -p pkgtest && tar -C pkgtest -xzf "dist/${pkg}.tar.gz"
          # shellcheck disable=SC1090,SC1091
          source "$PWD/pkgtest/${pkg}/envsetup.sh"
          export cjHeapSize=12GB
          npx --yes zx@8 ci/smoke/run_smoke.mjs "$PWD/pkgtest/${pkg}/bin/cjc"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.platform }}
          path: |
            dist/cjcj-${{ inputs.version }}-${{ matrix.platform }}.tar.gz
            dist/cjcj-${{ inputs.version }}-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags=(--title "cjcj v${{ inputs.version }}" --notes "cjcj v${{ inputs.version }}")
          if [ "${{ inputs.prerelease }}" = "true" ]; then flags+=(--prerelease); fi
          if [ "${{ inputs.draft }}" = "true" ]; then flags+=(--draft); fi
          mapfile -t assets < <(find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.zip' \) | sort)
          gh release create "v${{ inputs.version }}" "${flags[@]}" "${assets[@]}"

# linux-aarch64 is held (see the matrix comment). macOS/Windows are intentionally absent:
# no per-platform shim .o and the cjc-name GC exclusion is ungated on Darwin/PE (needs the
# runtime patch extended). BLOCKED-REPORT: reports/REPORT-relmatrix.md.
# Adding a build platform needs a matching source-build matrix item in
# build-fixed-llc.yml and its llvm_platform value in the release matrix.
