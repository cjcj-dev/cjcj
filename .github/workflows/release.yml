# Release. Repackages the official SDK tree as a cjcj SDK: bin/cjc is our
# Cangjie-built compiler and runtime/lib/<plat>/libcangjie-runtime.{so,dylib} is rebuilt
# from the pinned cjcj-dev/cangjie-runtime main commit. Smoke runs against the
# packaged bin/cjc. Linux x64 and macOS x64/arm64 are enabled; set dry_run to
# build artifacts without publishing.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Build artifacts only, skip GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  CJCJ_TOOLCHAIN: nightly-1.2.0-alpha.20260721165458
  # RUNTIME_REF comes from ci/runtime_pin.env via the "Load runtime pin" step —
  # the pin lives in exactly one file (a stale copy here once poisoned the
  # runtime cache key while the build itself followed the pin file).

jobs:
  fixed-llvm-tools:
    name: Build LLVM tools
    uses: ./.github/workflows/build-fixed-llc.yml

  build:
    name: ${{ matrix.platform }} / Build release
    needs: fixed-llvm-tools
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, platform: linux-x64, llvm_platform: linux_x86_64 }
          - { runner: macos-15-intel, platform: darwin-x64, llvm_platform: darwin_x86_64, sdk_runtime_dir: darwin_x86_64_cjnative }
          - { runner: macos-15, platform: darwin-arm64, llvm_platform: darwin_aarch64, sdk_runtime_dir: darwin_aarch64_cjnative }
          # linux-aarch64 is validated through build + package (the cross-compiled shim
          # links, the native patched runtime builds), but the packaged compiler livelocks
          # the GC mutator-list lock on the oversubscribed 4-core arm runner
          # (04_iface_enum / 06_macro spin to the 240s watchdog and SIGABRT). Held until the
          # runtime aarch64 mutator-lock issue is fixed; then add an aarch64 source-build
          # tuple in build-fixed-llc.yml and re-enable this line. See REPORT-relmatrix.
          # - { runner: ubuntu-24.04-arm, platform: linux-aarch64, llvm_platform: linux_aarch64 }
    steps:
      - name: Checkout cjcj
        uses: actions/checkout@v4
      - name: Load runtime pin
        shell: bash
        run: cat ci/runtime_pin.env >> "$GITHUB_ENV"
      - name: Download LLVM tools
        if: runner.os == 'Linux'
        uses: actions/download-artifact@v4
        with:
          name: fixed-llvm-tools-${{ matrix.llvm_platform }}
          path: fixed-toolchain/${{ matrix.llvm_platform }}
      - name: Restore SDK cache
        id: sdkcache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Install SDK
        id: setup
        if: runner.os == 'Linux'
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
          FIXED_LLC_GZ: ${{ github.workspace }}/fixed-toolchain/${{ matrix.llvm_platform }}/llc.gz
        run: npx --yes zx@8 ci/setup_sdk.mjs
      - name: Save SDK cache
        if: runner.os == 'Linux' && steps.setup.outcome == 'success' && steps.sdkcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Restore runtime cache
        id: rtcache
        uses: actions/cache/restore@v4
        with:
          path: dist-runtime
          key: rt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.runner }}-${{ env.RUNTIME_REF }}
      # patchelf is always required by scripts/package_sdk.mjs, even on a runtime cache hit.
      - name: Install packaging dependency
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq patchelf
      - name: Install runtime build dependencies
        if: runner.os == 'Linux' && steps.rtcache.outputs.cache-hit != 'true'
        run: sudo apt-get install -y -qq clang cmake make
      - name: Build patched runtime
        if: steps.rtcache.outputs.cache-hit != 'true'
        env:
          RUNTIME_VERSION: ${{ inputs.version }}
        run: npx --yes zx@8 ci/build_patched_runtime.mjs "$PWD/dist-runtime"
      - name: Save runtime cache
        if: steps.rtcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dist-runtime
          key: rt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.runner }}-${{ env.RUNTIME_REF }}
      - name: Download native fixed LLVM tuple
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx --yes zx@8 ci/platform_matrix/fetch_llvm_tuple.mjs
      - name: Official SDK + cjcj build
        id: darwinbuild
        if: runner.os == 'macOS'
        env:
          GITCODE_API_KEY: ${{ secrets.GITCODE_API_KEY }}
          SDK_RUNTIME_DIR: ${{ matrix.sdk_runtime_dir }}
        run: npx --yes zx@8 ci/platform_matrix/build_cjcj.mjs
      - name: Save Darwin SDK cache
        if: runner.os == 'macOS' && steps.darwinbuild.outcome == 'success' && steps.sdkcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cjv
          key: cjv-${{ runner.os }}-${{ runner.arch }}-${{ env.CJCJ_TOOLCHAIN }}
      - name: Activate pinned runtime
        run: npx --yes zx@8 ci/install_patched_runtime.mjs "$PWD/dist-runtime"
      - name: Build runtime shim
        if: runner.os == 'Linux'
        env:
          CJCJ_LLVM_SHIM_O: ${{ github.workspace }}/fixed-toolchain/${{ matrix.llvm_platform }}/cjselfhost_llvmshim.o
        run: npx --yes zx@8 runtime_shim/build_shim.mjs
      - name: Build workspace
        if: runner.os == 'Linux'
        run: cjpm build
      - name: Compose SDK package
        run: |
          runtime_lib="$PWD/dist-runtime/libcangjie-runtime.so"
          if [ "$RUNNER_OS" = "macOS" ]; then runtime_lib="$PWD/dist-runtime/libcangjie-runtime.dylib"; fi
          npx --yes zx@8 scripts/package_sdk.mjs \
            --sdk "$CANGJIE_HOME" \
            --binary "$PWD/target/release/bin/cjcj::cjc" \
            --runtime-lib "$runtime_lib" \
            --version "${{ inputs.version }}" \
            --platform "${{ matrix.platform }}" \
            --outdir "$PWD/dist"
      # Smoke the shipped artifact: packaged bin/cjc (renamed) + fork-built runtime.
      - name: Verify packaged SDK
        run: |
          set -e
          pkg="cjcj-${{ inputs.version }}-${{ matrix.platform }}"
          mkdir -p pkgtest && tar -C pkgtest -xzf "dist/${pkg}.tar.gz"
          # shellcheck disable=SC1090,SC1091
          source "$PWD/pkgtest/${pkg}/envsetup.sh"
          export cjHeapSize=12GB
          npx --yes zx@8 ci/smoke/run_smoke.mjs "$PWD/pkgtest/${pkg}/bin/cjc"
      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.platform }}
          path: |
            dist/cjcj-${{ inputs.version }}-${{ matrix.platform }}.tar.gz
            dist/cjcj-${{ inputs.version }}-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout cjcj
        uses: actions/checkout@v4
      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags=(--title "cjcj v${{ inputs.version }}" --notes "cjcj v${{ inputs.version }}")
          if [ "${{ inputs.prerelease }}" = "true" ]; then flags+=(--prerelease); fi
          if [ "${{ inputs.draft }}" = "true" ]; then flags+=(--draft); fi
          mapfile -t assets < <(find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.zip' \) | sort)
          gh release create "v${{ inputs.version }}" "${flags[@]}" "${assets[@]}"

# linux-aarch64 is held (see the matrix comment). Windows remains absent pending its
# separate gating. Darwin consumes native artifacts from platform-tuples.yml through
# ci/platform_matrix/fetch_llvm_tuple.mjs; Linux x64 keeps build-fixed-llc.yml.
