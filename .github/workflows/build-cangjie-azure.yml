name: Build Cangjie SDK on Azure VM

# Spin up an ephemeral Azure VM, register it as a just-in-time GitHub
# self-hosted runner, run the Cangjie build there, then delete the entire
# resource group on the way out.
#
# Required repo secrets:
#   AZURE_CLIENT_ID         - App registration's application (client) ID
#   AZURE_TENANT_ID         - Microsoft Entra tenant ID
#   AZURE_SUBSCRIPTION_ID   - Subscription that gets billed for the VM
#   RUNNER_REGISTRATION_PAT - Fine-grained PAT (or GitHub App token) with
#                             repo "Administration: Write". Required to call
#                             POST /repos/.../actions/runners/generate-jitconfig
#                             — GITHUB_TOKEN cannot hold the administration
#                             scope, so this can't be replaced by it.
#
# Azure auth uses OIDC + federated credentials (no static SP password).
# Operational helpers live in .github/scripts/ and .github/cloud-init/ and
# can be exercised locally with the same env vars.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Global Cangjie tag/branch (blank = main)."
        required: false
        default: ""
      build_type:
        description: "Build type."
        required: true
        default: "relwithdebinfo"
        type: choice
        options:
          - release
          - debug
          - relwithdebinfo
      compiler_source:
        description: "Override compiler source. Format host/owner/repo.git:branch (branch optional, scheme auto-https)."
        required: false
        default: ""
      runtime_source:
        description: "Override runtime source. Same format as compiler_source."
        required: false
        default: ""
      tools_source:
        description: "Override tools source. Same format as compiler_source."
        required: false
        default: ""
      stdx_source:
        description: "Override stdx source. Same format as compiler_source."
        required: false
        default: ""
      vm_size:
        description: "Azure VM SKU."
        required: true
        default: "Standard_F16als_v6"
      vm_regions:
        description: "Space-separated, ordered region preference list. First with capacity wins."
        required: true
        default: "eastus2 eastus westus3 centralus westus2"
      vm_priority:
        description: "Spot first, fall back to Regular if no capacity."
        required: true
        default: "Spot"
        type: choice
        options:
          - Spot
          - Regular

permissions:
  id-token: write
  contents: read
  actions: write    # required by sccache GHA cache backend on the build job

defaults:
  run:
    shell: bash

env:
  RG_PREFIX: cangjie-${{ github.run_id }}-${{ github.run_attempt }}
  RUNNER_LABEL: cangjie-${{ github.run_id }}-${{ github.run_attempt }}
  RUNNER_VERSION: "2.334.0"

jobs:
  provision:
    name: Provision ephemeral VM
    runs-on: ubuntu-22.04
    outputs:
      runner_label: ${{ env.RUNNER_LABEL }}
      rg_name: ${{ steps.vm.outputs.rg }}
      region: ${{ steps.vm.outputs.region }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate JIT runner config
        id: jit
        env:
          GH_TOKEN: ${{ secrets.RUNNER_REGISTRATION_PAT }}
        run: |
          set -euo pipefail
          jit=$(.github/scripts/generate-jit.sh "${{ github.repository }}" "$RUNNER_LABEL")
          echo "::add-mask::$jit"
          {
            echo 'jit<<__JIT_EOF__'
            echo "$jit"
            echo '__JIT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Render cloud-init
        env:
          JIT: ${{ steps.jit.outputs.jit }}
        run: |
          .github/scripts/render-cloud-init.sh \
            .github/cloud-init/runner.template.yml \
            cloud-init.yml

      - name: Provision VM (try regions × zones × priority)
        id: vm
        env:
          RG_PREFIX: ${{ env.RG_PREFIX }}
          REGIONS: ${{ inputs.vm_regions }}
          SIZE: ${{ inputs.vm_size }}
          PRIORITY: ${{ inputs.vm_priority }}
          CLOUD_INIT: cloud-init.yml
        run: |
          .github/scripts/provision-vm.sh | tee -a "$GITHUB_OUTPUT"

      - name: Wait for runner registration
        env:
          GH_TOKEN: ${{ secrets.RUNNER_REGISTRATION_PAT }}
        run: .github/scripts/wait-for-runner.sh "${{ github.repository }}" "$RUNNER_LABEL" 600

  build:
    name: Build SDK (windows-x64)
    needs: provision
    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ needs.provision.outputs.runner_label }}
    timeout-minutes: 240
    env:
      CANGJIE_WORKSPACE: ${{ github.workspace }}/workspace
      CANGJIE_BUILD_ROOT: ${{ github.workspace }}/buildtools
      # Multi-level sccache: disk L0 (within-run reuse on the VM's NVMe) +
      # GHA cache L1 (cross-run reuse across ephemeral VMs). l0 write
      # policy: GHA hiccups don't block the build.
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_MULTILEVEL_CHAIN: "disk,gha"
      SCCACHE_MULTILEVEL_WRITE_ERROR_POLICY: "l0"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: "10G"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Install Python harness dependencies
        run: uv sync --frozen

      - name: Install Ubuntu system packages
        run: uv run cangjie-build install-system-deps

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Compute toolchain cache key
        id: tc-key
        run: |
          # Bump the version suffix when toolchain pinning changes
          # (LLVM_MINGW_TAG / OPENSSL_VERSION in toolchain/mingw.py).
          echo "key=mingw-${{ runner.os }}-llvm20220906-openssl3.0.9-v1" >> "$GITHUB_OUTPUT"
          echo "path=${{ env.CANGJIE_BUILD_ROOT }}/llvm-mingw-w64" >> "$GITHUB_OUTPUT"

      - name: Restore toolchain cache
        id: tc-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.tc-key.outputs.path }}
          key: ${{ steps.tc-key.outputs.key }}

      - name: Build MinGW toolchain
        if: steps.tc-cache.outputs.cache-hit != 'true'
        run: uv run cangjie-build --target windows-x64 install-mingw

      - name: Resolve effective Cangjie version
        id: cjver
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Cangjie source repositories
        env:
          TAG: ${{ inputs.tag }}
          COMPILER_SOURCE: ${{ inputs.compiler_source }}
          RUNTIME_SOURCE: ${{ inputs.runtime_source }}
          TOOLS_SOURCE: ${{ inputs.tools_source }}
          STDX_SOURCE: ${{ inputs.stdx_source }}
        run: |
          set -euo pipefail
          args=()
          if [[ -n "$TAG" ]]; then args+=(--tag "$TAG"); fi
          mapfile -t override_args < <(.github/scripts/build-fetch-args.sh)
          args+=("${override_args[@]}")
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            fetch "${args[@]}"

      - name: Build all stages
        run: |
          set -euo pipefail
          for stage in compiler runtime stdlib stdx tools; do
            uv run cangjie-build \
              --target windows-x64 \
              --build-type ${{ inputs.build_type }} \
              --cangjie-version "${{ steps.cjver.outputs.value }}" \
              build "$stage"
          done

      - name: Package SDK
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            package

      - name: Verify SDK
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            verify

      - name: Upload SDK + STDX artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cangjie-windows-x64-${{ steps.cjver.outputs.value }}
          path: ${{ env.CANGJIE_WORKSPACE }}/software/cangjie-*-windows-x64-${{ steps.cjver.outputs.value }}*.*
          if-no-files-found: error

  cleanup:
    name: Tear down VM
    needs: [provision, build]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Tear down resource group + runner registration
        env:
          GH_TOKEN: ${{ secrets.RUNNER_REGISTRATION_PAT }}
          # provision job emits the actual RG it landed in. If provision
          # failed before that step, fall back to deleting any RG with our
          # run-id prefix so we don't leak a half-created one.
          PICKED_RG: ${{ needs.provision.outputs.rg_name }}
        run: |
          set -euo pipefail
          if [[ -n "${PICKED_RG:-}" ]]; then
            .github/scripts/teardown.sh "${{ github.repository }}" "$RUNNER_LABEL" "$PICKED_RG"
          else
            echo "Provision did not record an RG; sweeping any with prefix $RG_PREFIX-"
            for rg in $(az group list --query "[?starts_with(name,'${RG_PREFIX}-')].name" -o tsv); do
              echo "delete $rg"
              az group delete -n "$rg" --yes --no-wait
            done
            id=$(gh api "/repos/${{ github.repository }}/actions/runners" \
              --jq "[.runners[] | select(.name == \"${RUNNER_LABEL}\")][0].id // empty")
            if [[ -n "$id" ]]; then
              gh api -X DELETE "/repos/${{ github.repository }}/actions/runners/${id}"
            fi
          fi
