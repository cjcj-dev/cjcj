name: Build Cangjie SDK on Azure VM

# Spin up an ephemeral Azure VM, register it as a just-in-time GitHub
# self-hosted runner, run the Cangjie build there, then delete the entire
# resource group on the way out.
#
# Required repo secrets:
#   AZURE_CLIENT_ID         - App registration's application (client) ID
#   AZURE_TENANT_ID         - Microsoft Entra tenant ID
#   AZURE_SUBSCRIPTION_ID   - Subscription that gets billed for the VM
#   RUNNER_REGISTRATION_PAT - Fine-grained PAT (or GitHub App token) with
#                             repo "Administration: Write". Required to call
#                             POST /repos/.../actions/runners/generate-jitconfig
#                             — GITHUB_TOKEN cannot hold the administration
#                             scope, so this can't be replaced by it.
#
# Azure auth uses OIDC + federated credentials (no static SP password).
# Operational helpers live in .github/scripts/ and .github/cloud-init/ and
# can be exercised locally with the same env vars.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Global Cangjie tag/branch (blank = main)."
        required: false
        default: ""
      build_type:
        description: "Build type."
        required: true
        default: "relwithdebinfo"
        type: choice
        options:
          - release
          - debug
          - relwithdebinfo
      compiler_source:
        description: "Override compiler source: https://host/owner/repo.git:branch (branch optional)."
        required: false
        default: ""
      runtime_source:
        description: "Override runtime source: https://host/owner/repo.git:branch (branch optional)."
        required: false
        default: ""
      tools_source:
        description: "Override tools source: https://host/owner/repo.git:branch (branch optional)."
        required: false
        default: ""
      stdx_source:
        description: "Override stdx source: https://host/owner/repo.git:branch (branch optional)."
        required: false
        default: ""
      vm_size:
        description: "Azure VM SKU."
        required: true
        default: "Standard_F16als_v7"
      vm_regions:
        description: "Space-separated, ordered region preference list. First with capacity wins."
        required: true
        # eastus2 is cache-local (sccache blob container lives there). centralus
        # and westus3 are Regular-capacity fallbacks; F16als_v7 has 1/3/3 zones
        # there respectively per `az vm list-skus`. eastus and northcentralus
        # don't carry F16als_v7 in this subscription so they're not listed.
        default: "eastus2 centralus westus3"
      vm_priority:
        description: "Spot first, fall back to Regular if no capacity. Default Regular — see provision-vm.sh."
        required: true
        default: "Regular"
        type: choice
        options:
          - Spot
          - Regular

permissions:
  id-token: write
  contents: read
  actions: write    # required by actions/cache/save for the toolchain cache

defaults:
  run:
    shell: bash

env:
  RG_NAME: cangjie-${{ github.run_id }}-${{ github.run_attempt }}
  RUNNER_LABEL: cangjie-${{ github.run_id }}-${{ github.run_attempt }}
  RUNNER_VERSION: "2.334.0"

jobs:
  provision:
    name: Provision ephemeral VM
    runs-on: ubuntu-22.04
    outputs:
      runner_label: ${{ env.RUNNER_LABEL }}
      rg_name: ${{ env.RG_NAME }}
      region: ${{ steps.vm.outputs.region }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate JIT runner config
        id: jit
        env:
          GH_TOKEN: ${{ secrets.RUNNER_REGISTRATION_PAT }}
        run: |
          set -euo pipefail
          jit=$(.github/scripts/generate-jit.sh "${{ github.repository }}" "$RUNNER_LABEL")
          echo "::add-mask::$jit"
          {
            echo 'jit<<__JIT_EOF__'
            echo "$jit"
            echo '__JIT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Render cloud-init
        env:
          JIT: ${{ steps.jit.outputs.jit }}
        run: |
          .github/scripts/render-cloud-init.sh \
            .github/cloud-init/runner.template.yml \
            cloud-init.yml

      - name: Provision VM (try regions × zones × priority)
        id: vm
        env:
          RG: ${{ env.RG_NAME }}
          REGIONS: ${{ inputs.vm_regions }}
          SIZE: ${{ inputs.vm_size }}
          PRIORITY: ${{ inputs.vm_priority }}
          CLOUD_INIT: cloud-init.yml
        run: .github/scripts/provision-vm.sh | tee -a "$GITHUB_OUTPUT"

      - name: Wait for runner registration
        id: wait-runner
        env:
          GH_TOKEN: ${{ secrets.RUNNER_REGISTRATION_PAT }}
        run: .github/scripts/wait-for-runner.sh "${{ github.repository }}" "$RUNNER_LABEL" 900

      # If the runner never came online, dump cloud-init's log so we can
      # see whether apt was slow, the runner tarball download stalled, etc.
      # Best-effort: VM may have been preempted (Spot) so don't block on
      # az failures.
      - name: Dump cloud-init log on runner-registration timeout
        if: failure() && steps.wait-runner.outcome == 'failure'
        continue-on-error: true
        run: |
          set +e
          az vm run-command invoke -g "$RG_NAME" -n runner --command-id RunShellScript \
            --scripts 'echo "===cloud-init status==="; cloud-init status --long; echo "===tail cloud-init.log==="; tail -120 /var/log/cloud-init.log 2>/dev/null; echo "===tail cloud-init-output.log==="; tail -120 /var/log/cloud-init-output.log 2>/dev/null' \
            --query "value[0].message" -o tsv

  build:
    name: Build SDK (windows-x64)
    needs: provision
    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ needs.provision.outputs.runner_label }}
    timeout-minutes: 240
    env:
      CANGJIE_WORKSPACE: ${{ github.workspace }}/workspace
      CANGJIE_BUILD_ROOT: ${{ github.workspace }}/buildtools
      # Azure Blob Storage backend for sccache. GHA Cache API rate-limited
      # writes (~5k of 10k compiles got 429s in past runs), so we use a
      # dedicated blob container in eastus2 (same region as the build VM,
      # so reads/writes are intra-region and free).
      SCCACHE_AZURE_CONNECTION_STRING: ${{ secrets.SCCACHE_AZURE_CONNECTION_STRING }}
      SCCACHE_AZURE_BLOB_CONTAINER: sccache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Install Python harness dependencies
        run: uv sync --frozen

      - name: Install Ubuntu system packages
        run: uv run cangjie-build install-system-deps

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Compute toolchain cache key
        id: tc-key
        run: |
          set -euo pipefail
          echo "key=$(.github/scripts/toolchain-cache-key.sh windows-x64)" >> "$GITHUB_OUTPUT"
          echo "path=${{ env.CANGJIE_BUILD_ROOT }}/llvm-mingw-w64" >> "$GITHUB_OUTPUT"

      - name: Restore toolchain cache
        id: tc-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.tc-key.outputs.path }}
          key: ${{ steps.tc-key.outputs.key }}

      - name: Build MinGW toolchain
        if: steps.tc-cache.outputs.cache-hit != 'true'
        # mingw.py passes -DLLVM_USE_LINKER=lld to build-llvm.sh when ld.lld
        # is on PATH (the apt 'lld' package, installed via install-system-deps).
        # Host LLVM bootstrap links 5-10x faster; cross-target scripts keep
        # the mingw clang wrappers' default linker.
        run: uv run cangjie-build --target windows-x64 install-mingw

      # Save the toolchain cache as soon as it's built — independent of
      # whether subsequent build stages (or this whole job) succeed. Spot
      # eviction during Cangjie compile would otherwise lose the 30-60 min
      # of toolchain work for the next run too.
      - name: Save toolchain cache
        if: always() && steps.tc-cache.outputs.cache-hit != 'true' && hashFiles(format('{0}/llvm-mingw-w64/bin/x86_64-w64-mingw32-clang', env.CANGJIE_BUILD_ROOT)) != ''
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.tc-key.outputs.path }}
          key: ${{ steps.tc-key.outputs.key }}

      - name: Resolve effective Cangjie version
        id: cjver
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Cangjie source repositories
        env:
          TAG: ${{ inputs.tag }}
          COMPILER_SOURCE: ${{ inputs.compiler_source }}
          RUNTIME_SOURCE: ${{ inputs.runtime_source }}
          TOOLS_SOURCE: ${{ inputs.tools_source }}
          STDX_SOURCE: ${{ inputs.stdx_source }}
        run: |
          set -euo pipefail
          args=()
          if [[ -n "$TAG" ]]; then args+=(--tag "$TAG"); fi
          mapfile -t override_args < <(.github/scripts/build-fetch-args.sh)
          args+=("${override_args[@]}")
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            fetch "${args[@]}"

      # Stages are split into separate steps so each gets its own log group
      # in the GH Actions UI — a single combined log for all five stages
      # crosses the size threshold where the live-log viewer fails to load.
      - name: Build compiler
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            build compiler

      - name: Build runtime
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            build runtime

      - name: Build stdlib
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            build stdlib

      - name: Build stdx
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            build stdx

      - name: Build tools
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            build tools

      - name: Package SDK
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            package

      - name: Verify SDK
        run: |
          uv run cangjie-build \
            --target windows-x64 \
            --build-type ${{ inputs.build_type }} \
            --cangjie-version "${{ steps.cjver.outputs.value }}" \
            verify

      - name: Upload SDK + STDX artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cangjie-windows-x64-${{ steps.cjver.outputs.value }}
          path: ${{ env.CANGJIE_WORKSPACE }}/software/cangjie-*-windows-x64-${{ steps.cjver.outputs.value }}*.*
          if-no-files-found: error

  cleanup:
    name: Tear down VM
    needs: [provision, build]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Tear down resource group + runner registration
        env:
          GH_TOKEN: ${{ secrets.RUNNER_REGISTRATION_PAT }}
        run: .github/scripts/teardown.sh "${{ github.repository }}" "$RUNNER_LABEL" "$RG_NAME"
