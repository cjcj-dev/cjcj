name: Reap orphan cloud resources

# Safety net for cloud VM workflows: if a run gets cancelled before its cleanup
# job executes, the VM keeps billing forever. This sweep runs every hour and
# deletes stale cangjie-* Azure resource groups and GCP runner VMs.

on:
  schedule:
    - cron: "17 * * * *"      # hourly at :17
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  reap-azure:
    name: Reap orphan Azure RGs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Reap orphan RGs
        env:
          MAX_AGE_HOURS: "6"
        run: .github/scripts/azure-reap-orphans.sh

  reap-gcp:
    name: Reap orphan GCP VMs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: default-490702
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Reap orphan GCP VMs
        env:
          MAX_AGE_HOURS: "6"
        run: bash .github/scripts/gcp-reap-orphans.sh
