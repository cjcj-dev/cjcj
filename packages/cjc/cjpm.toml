[package]
  cjc-version = "1.1.0"
  name = "cjc"
  organization = "cjcj"
  description = "Self-hosted Cangjie compiler executable entry"
  version = "0.1.0"
  target-dir = ""
  script-dir = ""
  src-dir = "src"
  output-type = "executable"
  compile-option = ""
  override-compile-option = ""
  link-option = "--export-dynamic runtime_shim/cjselfhost_llvmshim.o /root/.cjv/toolchains/nightly-1.2.0-alpha.20260619020029/third_party/llvm/lib/libLLVM-15.so -lstdc++ -rpath /root/.cjv/toolchains/nightly-1.2.0-alpha.20260619020029/third_party/llvm/lib"
  package-configuration = {}

[dependencies]
  "cjcj::driver" = { path = "../driver" }
  "cjcj::utils" = { path = "../utils" }
  "cjcj::frontend" = { path = "../frontend" }
  "cjcj::chir" = { path = "../chir" }
  "cjcj::basic" = { path = "../basic" }
