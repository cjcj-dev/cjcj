[package]
  cjc-version = "1.1.0"
  name = "cjc"
  organization = "cangjie_compiler"
  description = "Self-hosted Cangjie compiler executable entry"
  version = "0.1.0"
  target-dir = ""
  script-dir = ""
  src-dir = "src"
  output-type = "executable"
  compile-option = ""
  override-compile-option = ""
  link-option = "/root/.cjv/toolchains/nightly-1.1.0-alpha.20260331010029/third_party/llvm/lib/libLLVM-15.so -rpath /root/.cjv/toolchains/nightly-1.1.0-alpha.20260331010029/third_party/llvm/lib"
  package-configuration = {}

[dependencies]
  "cangjie_compiler::driver" = { path = "../driver" }
