[package]
  cjc-version = "1.1.0"
  name = "frontend"
  organization = "cjcj"
  description = "Self-hosted Cangjie compiler Frontend module scaffold"
  version = "0.1.0"
  target-dir = ""
  script-dir = ""
  src-dir = "src"
  output-type = "static"
  compile-option = ""
  override-compile-option = ""
  link-option = ""
  package-configuration = {}

[dependencies]
  "cjcj::ast" = { path = "../ast" }
  "cjcj::basic" = { path = "../basic" }
  "cjcj::chir" = { path = "../chir" }
  "cjcj::codegen" = { path = "../codegen" }
  "cjcj::conditional_compilation" = { path = "../conditional_compilation" }
  "cjcj::flatbuffers" = { path = "../flatbuffers" }
  "cjcj::lex" = { path = "../lex" }
  "cjcj::macro_pkg" = { path = "../macro" }
  "cjcj::mangle" = { path = "../mangle" }
  "cjcj::meta_transformation" = { path = "../meta_transformation" }
  "cjcj::modules" = { path = "../modules" }
  "cjcj::option" = { path = "../option" }
  "cjcj::parse" = { path = "../parse" }
  "cjcj::sema" = { path = "../sema" }
  "cjcj::utils" = { path = "../utils" }
