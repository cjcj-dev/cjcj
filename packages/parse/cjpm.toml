[package]
  cjc-version = "1.1.0"
  name = "parse"
  organization = "cjcj"
  description = "Self-hosted Cangjie compiler Parse module scaffold"
  version = "0.1.0"
  target-dir = ""
  script-dir = ""
  src-dir = "src"
  output-type = "static"
  # -O1: patched LLVM 15 llc has a nondeterministic SelectionDAG memory-corruption bug on the
  # O2-inlined 19k-line VisitChildren (485 allocas + 113-way switch); official cjc -O2 crashes
  # identically on this package. Evidence: reports/REPORT-o2root.md.
  # NOTE: member override-compile-option is ignored for non-entry modules (cjpm manual);
  # member compile-option appends after the workspace-level flags, so -O1 wins last.
  compile-option = "-O1"
  override-compile-option = ""
  link-option = ""
  package-configuration = {}

[dependencies]
  "cjcj::basic" = { path = "../basic" }
  "cjcj::ast" = { path = "../ast" }
  "cjcj::lex" = { path = "../lex" }
  "cjcj::option" = { path = "../option" }
  "cjcj::utils" = { path = "../utils" }
