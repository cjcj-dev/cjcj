[package]
  cjc-version = "1.1.0"
  name = "chir"
  organization = "cjcj"
  description = "Self-hosted Cangjie compiler CHIR module scaffold"
  version = "0.1.0"
  target-dir = ""
  script-dir = ""
  src-dir = "src"
  output-type = "static"
  # -O1: patched LLVM 15 llc nondeterministic SelectionDAG memory corruption on O2-inlined
  # giant functions; probed 0719 (o2probe2): this package hits llc exit 139 at -O2.
  # Evidence: reports/REPORT-o2root.md + MERGE_QUEUE o2probe2 rounds.
  compile-option = "-O1"
  override-compile-option = ""
  link-option = ""
  package-configuration = {}

[dependencies]
  "cjcj::ast" = { path = "../ast" }
  "cjcj::basic" = { path = "../basic" }
  "cjcj::flatbuffers" = { path = "../flatbuffers" }
  "cjcj::incremental_compilation" = { path = "../incremental_compilation" }
  "cjcj::mangle" = { path = "../mangle" }
  "cjcj::modules" = { path = "../modules" }
  "cjcj::option" = { path = "../option" }
  "cjcj::sema" = { path = "../sema" }
  "cjcj::utils" = { path = "../utils" }
